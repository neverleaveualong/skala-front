<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 시간표</title>
  <link rel="stylesheet" href="../css/style.css">
  <!-- 💡 Excel 데이터 연동 가변 시간표 렌더링 모듈 추가 -->
  <script type="module" src="../script/renderSchedule.js"></script>
</head>
<body>
  <div class="container">
    <div class="brand-logo">
      <span class="brand-text-ax">SK AX</span>
      <img src="./sk_logo.png" alt="SK Logo" width="24" height="24" style="vertical-align: middle;">
      <span class="brand-text-skala">&amp; SKALA</span>
    </div>
    <a href="index.html" class="back-link">← 메인 화면으로 돌아가기</a>
    
    <header>
      <h1>나의 시간표 (AI 에이전트 교육 과정)</h1>
    </header>

    <main>
      <!-- 💡 주차 선택 네비게이션 및 반 선택 드롭다운 컨트롤 배치 -->
      <div class="schedule-controls">
        <div class="control-group">
          <label for="class-select">🏫 학습 반 선택: </label>
          <select id="class-select" class="class-dropdown">
            <option value="1반">201호 (1반)</option>
            <option value="2반">202호 (2반)</option>
            <option value="3반">204호 (3반)</option>
            <option value="4반">205호 (4반)</option>
          </select>
        </div>
        
        <div class="navigation-group">
          <button id="prev-week-btn" class="nav-btn">◀ 이전 주</button>
          <span id="week-label" class="week-label-text">제 1 주차</span>
          <button id="next-week-btn" class="nav-btn">다음 주 ▶</button>
        </div>
      </div>

      <!-- 동적으로 랜더링되는 시간표 테이블 -->
      <table border="1" width="100%" cellpadding="10" cellspacing="0" class="schedule-table">
        <thead>
          <tr id="schedule-table-header">
            <th>교시 / 시간</th>
            <th>월요일</th>
            <th>화요일</th>
            <th>수요일</th>
            <th>목요일</th>
            <th>금요일</th>
          </tr>
        </thead>
        <tbody id="schedule-table-body">
          <!-- JS 모듈을 통해 주차별 날짜에 맞춰 동적으로 삽입됩니다. -->
        </tbody>
      </table>
    </main>
  </div>
</body>
</html>
