<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <div class="brand-logo">
      <span class="brand-text-ax">SK AX</span>
      <img src="./sk_logo.png" alt="SK Logo" width="24" height="24" style="vertical-align: middle;">
      <span class="brand-text-skala">&amp; SKALA</span>
    </div>
    <a href="index.html" class="back-link">← 메인 화면으로 돌아가기</a>
  <header>
    <h1>회원가입</h1>
  </header>

  <!-- 회원가입 폼 전송 설정 (GET 방식) -->
  <main>
    <form action="signUpResult.html" method="get">
      <!-- 계정 및 기본 정보 입력 영역 -->
      <fieldset>
        <!-- 필드 그룹 제목 -->
        <legend>기본 회원 정보</legend>
        
        <p>
          <label for="userId">아이디 (ID):</label><br>
          <input type="text" id="userId" name="userId" placeholder="영문, 숫자 포함 4~12자" maxlength="12" autofocus required>
        </p>
        
        <p>
          <label for="userPw">비밀번호:</label><br>
          <input type="password" id="userPw" name="userPw" placeholder="영문, 숫자, 특수문자 조합" required>
        </p>

        <p>
          <label for="userName">이름:</label><br>
          <input type="text" id="userName" name="userName" placeholder="성명을 입력하세요" required>
        </p>

        <p>
          <label for="birthDate">생년월일:</label><br>
          <input type="date" id="birthDate" name="birthDate" required>
        </p>
      </fieldset>
      
      <fieldset>
        <legend>추가 정보 및 선택 사항</legend>

        <p>
          <label for="nationality">국적:</label><br>
          <input type="text" id="nationality" name="nationality" value="대한민국" readonly>
        </p>

        <p>
          <label for="userPhone">연락처:</label><br>
          <input type="tel" id="userPhone" name="userPhone" placeholder="010-1234-5678" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" required>
        </p>

        <p>
          <label for="userEmail">이메일 주소:</label><br>
          <input type="email" id="userEmail" name="userEmail" placeholder="example@domain.com" required>
        </p>

        <p>
          <label for="jobRole">희망 직무 분야:</label><br>
          <select id="jobRole" name="jobRole" required>
            <option value="">-- 직무를 선택하세요 --</option>
            <option value="frontend">프론트엔드 개발자</option>
            <option value="backend">백엔드 개발자</option>
            <option value="fullstack">풀스택 개발자</option>
            <option value="pm">프로젝트 매니저 (PM)</option>
          </select>
        </p>

        <p>
          <label for="techStack">주요 사용 기술 (자동완성 지원):</label><br>
          <input type="text" id="techStack" name="techStack" list="techList" placeholder="기술 입력 또는 선택">
          <datalist id="techList">
            <option value="HTML5"></option>
            <option value="CSS3"></option>
            <option value="JavaScript"></option>
            <option value="Python"></option>
            <option value="React"></option>
          </datalist>
        </p>

        <p>
          <label for="experience">개발 경력 연수:</label><br>
          <input type="number" id="experience" name="experience" min="0" max="50" step="1" value="0"> 년
        </p>

        <p>
          <label for="portfolio">포트폴리오 주소 (URL):</label><br>
          <input type="url" id="portfolio" name="portfolio" placeholder="https://github.com/username">
        </p>

        <p>
          가입 경로:<br>
          <label><input type="radio" name="referral" value="search" checked> 인터넷 검색</label>
          <label><input type="radio" name="referral" value="friend"> 지인 추천</label>
          <label><input type="radio" name="referral" value="ad"> 광고/홍보</label>
        </p>

        <p>
          알림 수신 동의:<br>
          <label><input type="checkbox" name="newsletter" value="email"> 이메일 뉴스레터 수신</label>
          <label><input type="checkbox" name="smsAlert" value="sms"> SMS 공지 알림 수신</label>
        </p>

        <p>
          <label for="remarks">가입 인사 및 건의사항:</label><br>
          <textarea id="remarks" name="remarks" rows="4" cols="50" placeholder="가입 인사나 남기실 말씀을 자유롭게 적어주세요."></textarea>
        </p>

        <p>
          <label><input type="checkbox" name="agree" value="yes" required> 개인정보 수집 및 이용약관에 동의합니다. (필수)</label>
        </p>
      </fieldset>
      
      <input type="submit" value="회원가입">
      <input type="reset" value="초기화">
    </form>
  </main>

  
  </div>
</body>
</html>
